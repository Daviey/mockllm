name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go build ./...
      - run: go test -v -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  generate:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go run ./cmd/mockllm-gen -output ./providers-generated -providers openai,anthropic,google
      - run: go build -o mockllm ./cmd/mockllm
      - run: |
          ./mockllm -port 8080 -specs ./providers-generated &
          sleep 2
          curl -sf http://localhost:8080/_health
          curl -sf http://localhost:8080/v1/chat/completions -H "Content-Type: application/json" -d '{"model":"gpt-4","messages":[]}'
          curl -sf http://localhost:8080/v1/models
          kill %1

  docker:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t mockllm .
      - run: docker run -d --name test -p 8080:8080 mockllm
      - run: sleep 2 && curl -sf http://localhost:8080/_health
      - run: docker stop test
